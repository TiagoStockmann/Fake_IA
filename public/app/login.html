<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0613" />
  <title>fake.ia — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700;800&family=Inter+Tight:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --accent: #8B5CF6;
      --accent-2: #6366F1;
      --accent-3: #06B6D4;
      --bg: #0a0613;
      --bg-2: #0f0a1f;
      --text-primary: #F4F1FF;
      --text-secondary: rgba(228,222,255,0.62);
      --text-muted: rgba(228,222,255,0.38);
      --border: rgba(255,255,255,0.10);
      --border-hover: rgba(139,92,246,0.45);
      --surface: rgba(22,16,42,0.38);
      --glass-highlight: linear-gradient(135deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.04) 35%, rgba(255,255,255,0) 60%);
      --glass-inset: inset 0 1px 0 rgba(255,255,255,0.18), inset 0 -1px 0 rgba(255,255,255,0.04), inset 1px 0 0 rgba(255,255,255,0.06);
    }

    html[data-theme="light"] {
      --bg: #F1EDF8;
      --bg-2: #E8E0F3;
      --text-primary: #1a1235;
      --text-secondary: rgba(26,18,53,0.65);
      --text-muted: rgba(26,18,53,0.40);
      --border: rgba(0,0,0,0.08);
      --border-hover: rgba(139,92,246,0.5);
      --surface: rgba(255,255,255,0.55);
      --glass-highlight: linear-gradient(135deg, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0.2) 35%, rgba(255,255,255,0) 60%);
      --glass-inset: inset 0 1px 0 rgba(255,255,255,0.6), inset 0 -1px 0 rgba(0,0,0,0.04), inset 1px 0 0 rgba(255,255,255,0.3);
    }

    body {
      min-height: 100vh; min-height: 100dvh;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg);
      font-family: 'Inter Tight', system-ui, sans-serif;
      color: var(--text-primary);
      overflow: hidden;
    }

    /* Orbs */
    .orb { position: fixed; border-radius: 50%; filter: blur(100px); pointer-events: none; opacity: 0.5; }
    .orb-1 { width: 420px; height: 420px; background: rgba(139,92,246,0.35); top: -10%; left: -5%; animation: float 18s ease-in-out infinite; }
    .orb-2 { width: 350px; height: 350px; background: rgba(99,102,241,0.28); bottom: -8%; right: -5%; animation: float 22s ease-in-out infinite reverse; }
    .orb-3 { width: 280px; height: 280px; background: rgba(6,182,212,0.22); top: 50%; left: 60%; animation: float 15s ease-in-out infinite; }
    @keyframes float { 0%,100%{ transform: translate(0,0) } 50%{ transform: translate(30px,-30px) } }

    /* Card */
    .login-card {
      position: relative; z-index: 1;
      width: 100%; max-width: 420px;
      padding: 48px 36px;
      margin: 20px;
      border-radius: 24px;
      border: 1px solid var(--border);
      background: var(--surface);
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      box-shadow: 0 25px 60px rgba(0,0,0,0.35), var(--glass-inset);
    }
    .login-card::before {
      content: ""; position: absolute; inset: 0; border-radius: 24px;
      background: var(--glass-highlight); pointer-events: none; z-index: 0;
    }
    .login-card > * { position: relative; z-index: 1; }

    /* Logo */
    .login-logo { text-align: center; margin-bottom: 36px; }
    .brand-mark {
      display: inline-flex; align-items: center; justify-content: center;
      width: 56px; height: 56px; margin-bottom: 16px;
      position: relative;
    }
    .brand-mark svg { width: 44px; height: 44px; }
    .brand-halo {
      position: absolute; inset: -6px; border-radius: 50%;
      background: conic-gradient(from 0deg, var(--accent), var(--accent-3), var(--accent-2), var(--accent));
      opacity: 0.35; filter: blur(8px);
      animation: spin 6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .logo-text { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.6rem; letter-spacing: -0.04em; }
    .logo-text em { font-style: normal; background: linear-gradient(135deg, var(--accent), var(--accent-3)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    .login-subtitle { text-align: center; color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 32px; line-height: 1.5; }

    /* Form */
    .form-group { margin-bottom: 24px; }
    .form-label { display: block; font-size: 0.78rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 8px; }
    .form-input {
      width: 100%; padding: 14px 16px;
      border-radius: 14px;
      border: 1.5px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: var(--text-primary);
      font-family: inherit; font-size: 1rem;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .form-input::placeholder { color: var(--text-muted); }
    .form-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(139,92,246,0.18);
    }

    html[data-theme="light"] .form-input {
      background: rgba(0,0,0,0.03);
    }

    .login-btn {
      width: 100%; padding: 14px;
      border: none; border-radius: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.3s;
      letter-spacing: -0.02em;
    }
    .login-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(139,92,246,0.4); }
    .login-btn:active { transform: translateY(0); }
    .login-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .error-msg { color: #F43F5E; font-size: 0.82rem; margin-top: 8px; display: none; }
    .error-msg.visible { display: block; }

    .footer-text { text-align: center; margin-top: 28px; font-size: 0.78rem; color: var(--text-muted); }
  </style>
</head>
<body>

  <div class="orb orb-1" aria-hidden="true"></div>
  <div class="orb orb-2" aria-hidden="true"></div>
  <div class="orb orb-3" aria-hidden="true"></div>

  <div class="login-card">
    <div class="login-logo">
      <span class="brand-mark">
        <span class="brand-halo"></span>
        <svg viewBox="0 0 32 32" fill="none">
          <defs>
            <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#8B5CF6"/>
              <stop offset="55%" stop-color="#6366F1"/>
              <stop offset="100%" stop-color="#06B6D4"/>
            </linearGradient>
            <linearGradient id="ss" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stop-color="white" stop-opacity="0.55"/>
              <stop offset="60%" stop-color="white" stop-opacity="0"/>
            </linearGradient>
          </defs>
          <path d="M16 3 L27 7 V15 C27 22 22 27 16 29 C10 27 5 22 5 15 V7 Z" fill="url(#sg)"/>
          <path d="M16 3 L27 7 V15 C27 22 22 27 16 29 C10 27 5 22 5 15 V7 Z" fill="url(#ss)"/>
          <path d="M11 16 L14.5 19.5 L21 12.5" stroke="white" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
      </span>
      <div class="logo-text">fake<em>.ia</em></div>
    </div>

    <p class="login-subtitle">Acesse o verificador de notícias com inteligência artificial</p>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label" for="username">Nome de usuário</label>
        <input class="form-input" type="text" id="username" placeholder="Digite seu username" autocomplete="username" required minlength="2" maxlength="50" />
        <p class="error-msg" id="errorMsg">Por favor, insira um nome de usuário válido.</p>
      </div>
      <button class="login-btn" type="submit">Entrar</button>
    </form>

    <p class="footer-text">Verificação segura em tempo real</p>
  </div>

  <script>
    // Apply saved theme
    const savedTheme = localStorage.getItem("tema") || "dark";
    document.documentElement.setAttribute("data-theme", savedTheme);

    // If already logged in, redirect
    if (localStorage.getItem("fakeia_user")) {
      window.location.replace("index.html");
    }

    function handleLogin(e) {
      e.preventDefault();
      const input = document.getElementById("username");
      const error = document.getElementById("errorMsg");
      const val = input.value.trim();

      if (val.length < 2) {
        error.classList.add("visible");
        input.focus();
        return;
      }

      error.classList.remove("visible");
      localStorage.setItem("fakeia_user", val);
      window.location.href = "index.html";
    }

    document.getElementById("username").addEventListener("input", () => {
      document.getElementById("errorMsg").classList.remove("visible");
    });
  </script>
</body>
</html>
